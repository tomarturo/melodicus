name: Keep Supabase Alive

on:
  schedule:
    # Runs every 4 days at midnight UTC
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.REACT_APP_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
