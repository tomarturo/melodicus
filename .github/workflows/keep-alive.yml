name: Keep Supabase Alive

on:
  schedule:
    # Runs every 4 days at midnight UTC
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: |
          URL="${{ secrets.REACT_APP_SUPABASE_URL }}"
          echo "URL length: ${#URL}"
          echo "URL starts with https: $(echo "$URL" | grep -c '^https://')"
          STATUS=$(curl -v -s -o /dev/null -w "%{http_code}" \
            "${URL}/rest/v1/" \
            -H "apikey: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}" 2>&1 | tail -20)
          echo "$STATUS"
